# YASB Widget Configuration
# Copy these widget definitions into your YASB config.yaml

# ━━━ OPTION 1: Grouped widget (RECOMMENDED) ━━━━━━━━━━━━━━━━━━━━
# A collapsible container showing all 5 platforms with accent colors.
# Left-click toggles compact/detailed. Right-click opens dashboard.
#
# Add ONLY "ai_usage_group" to your bar widgets:
#   widgets_right: ["ai_usage_group", "volume", "clock"]

  ai_usage_group:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "ai-usage-group"
      widgets: ["ai_chatgpt", "ai_copilot", "ai_claude", "ai_ollama", "ai_zai", "ai_gemini", "ai_status"]

  ai_chatgpt:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\udb80\udcab</span> {data[chatgpt_stale_marker]}{data[chatgpt_session]}%·{data[chatgpt_weekly]}% ↻{data[chatgpt_limit_reset]}"
      label_alt: "<span>\udb80\udcab</span> {data[chatgpt_stale_marker]}S:{data[chatgpt_session]}% ↻{data[chatgpt_limit_reset]}  W:{data[chatgpt_weekly]}% ↻{data[chatgpt_weekly_reset]}"
      class_name: "ai-chatgpt"
      label_placeholder: "\udb80\udcab --"
      tooltip: true
      tooltip_label: "ChatGPT Plus\nSession: {data[chatgpt_session]}% (Resets in {data[chatgpt_limit_reset]})\nWeekly: {data[chatgpt_weekly]}% (Resets in {data[chatgpt_weekly_reset]})"
      exec_options:
        run_cmd: "curl.exe -sf --max-time 5 http://localhost:3456/api/yasb/chatgpt"
        run_interval: 120000
        return_format: "json"
        hide_empty: true
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "exec curl.exe -sf http://localhost:3456/api/yasb/refresh"

  ai_copilot:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\uf113</span> {data[copilot_stale_marker]}{data[copilot_pct]}%"
      label_alt: "<span>\uf113</span> {data[copilot_stale_marker]}{data[copilot_used]}/{data[copilot_total]} ↻{data[copilot_reset]}"
      class_name: "ai-copilot"
      label_placeholder: "\uf113 --"
      tooltip: true
      tooltip_label: "GitHub Copilot Pro\nUsed: {data[copilot_used]}/{data[copilot_total]} premium\nPercent: {data[copilot_pct]}%\nResets in: {data[copilot_reset]}"
      exec_options:
        run_cmd: "curl.exe -sf --max-time 5 http://localhost:3456/api/yasb/copilot"
        run_interval: 120000
        return_format: "json"
        hide_empty: true
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "exec curl.exe -sf http://localhost:3456/api/yasb/refresh"

  ai_claude:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\udb81\ude2e</span> {data[claude_stale_marker]}{data[claude_session]}%·{data[claude_weekly]}% ↻{data[claude_limit_reset]}"
      label_alt: "<span>\udb81\ude2e</span> {data[claude_stale_marker]}S:{data[claude_session]}% ↻{data[claude_limit_reset]}  W:{data[claude_weekly]}% ↻{data[claude_weekly_reset]}"
      class_name: "ai-claude"
      label_placeholder: "\udb81\ude2e --"
      tooltip: true
      tooltip_label: "Claude Pro\nSession: {data[claude_session]}% (Resets in {data[claude_limit_reset]})\nWeekly: {data[claude_weekly]}% (Resets in {data[claude_weekly_reset]})"
      exec_options:
        run_cmd: "curl.exe -sf --max-time 5 http://localhost:3456/api/yasb/claude"
        run_interval: 120000
        return_format: "json"
        hide_empty: true
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "exec curl.exe -sf http://localhost:3456/api/yasb/refresh"

  ai_ollama:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\uf201</span> {data[ollama_stale_marker]}{data[ollama_session]}%·{data[ollama_weekly]}% ↻{data[ollama_limit_reset]}"
      label_alt: "<span>\uf201</span> {data[ollama_stale_marker]}S:{data[ollama_session]}% ↻{data[ollama_limit_reset]}  W:{data[ollama_weekly]}% ↻{data[ollama_weekly_reset]}"
      class_name: "ai-ollama"
      label_placeholder: "\uf201 --"
      tooltip: true
      tooltip_label: "Ollama\nSession: {data[ollama_session]}% (Resets in {data[ollama_limit_reset]})\nWeekly: {data[ollama_weekly]}% (Resets in {data[ollama_weekly_reset]})"
      exec_options:
        run_cmd: "curl.exe -sf --max-time 5 http://localhost:3456/api/yasb/ollama"
        run_interval: 120000
        return_format: "json"
        hide_empty: true
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "exec curl.exe -sf http://localhost:3456/api/yasb/refresh"

  ai_zai:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\udb80\udea8</span> {data[zai_stale_marker]}{data[zai_token_pct]}%·{data[zai_mcp_pct]}%"
      label_alt: "<span>\udb80\udea8</span> {data[zai_stale_marker]}Token:{data[zai_token_pct]}% MCP:{data[zai_mcp_pct]}%"
      class_name: "ai-zai"
      label_placeholder: "\udb80\udea8 --"
      tooltip: true
      tooltip_label: "Z.AI GLM Coding\nToken (5h): {data[zai_token_pct]}%\nMCP (Monthly): {data[zai_mcp_pct]}%"
      exec_options:
        run_cmd: "curl.exe -sf --max-time 5 http://localhost:3456/api/yasb/zai"
        run_interval: 120000
        return_format: "json"
        hide_empty: true
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "exec curl.exe -sf http://localhost:3456/api/yasb/refresh"


  ai_gemini:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\uf1a0</span> {data[gemini_stale_marker]}{data[gemini_rpd_pct]}%"
      label_alt: "<span>\uf1a0</span> {data[gemini_stale_marker]}{data[gemini_rpd_used]}/{data[gemini_rpd_limit]} RPD ↻{data[gemini_rpd_reset]}"
      class_name: "ai-gemini"
      label_placeholder: "\uf1a0 --"
      tooltip: true
      tooltip_label: "Gemini - {data[gemini_model]}\nRPM: {data[gemini_rpm_used]}/{data[gemini_rpm_limit]}\nTPM: {data[gemini_tpm_used]}/{data[gemini_tpm_limit]}\nRPD: {data[gemini_rpd_used]}/{data[gemini_rpd_limit]} ({data[gemini_rpd_pct]}%)\nResets in: {data[gemini_rpd_reset]}"
      exec_options:
        run_cmd: "curl.exe -sf --max-time 5 http://localhost:3456/api/yasb/gemini"
        run_interval: 120000
        return_format: "json"
        hide_empty: true
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "exec curl.exe -sf http://localhost:3456/api/yasb/refresh"

  ai_status:
    type: "yasb.custom.CustomWidget"
    options:
      label: "{data[indicator]} {data[next_label]}"
      label_alt: "{data[indicator]} {data[next_label]}"
      class_name: "ai-status"
      label_placeholder: "\uf10c"
      tooltip: true
      tooltip_label: "AI Usage Dashboard\nStatus: Online\nNext refresh in: {data[next_s]}s\nLeft-click: open dashboard\nRight-click: refresh data"
      exec_options:
        run_cmd: "curl.exe -sf --max-time 2 http://localhost:3456/api/health"
        run_interval: 5000
        return_format: "json"
        hide_empty: false
      callbacks:
        on_left: "exec cmd /c start http://localhost:3456"
        on_middle: "do_nothing"
        on_right: "exec curl.exe -sf http://localhost:3456/api/yasb/refresh"


